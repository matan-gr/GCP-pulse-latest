<svg xmlns="http://www.w3.org/2005/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4" />
      <stop offset="100%" stop-color="#1A73E8" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EA4335" />
      <stop offset="50%" stop-color="#FBBC05" />
      <stop offset="100%" stop-color="#34A853" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Cloud Base -->
  <path d="M 25 65 A 15 15 0 0 1 25 35 A 20 20 0 0 1 60 25 A 18 18 0 0 1 80 45 A 15 15 0 0 1 75 75 Z" 
        fill="url(#cloudGrad)" 
        stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round" />
        
  <!-- Pulse Line -->
  <path d="M 15 55 L 35 55 L 45 35 L 60 75 L 70 55 L 85 55" 
        fill="none" 
        stroke="url(#pulseGrad)" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow)" />
</svg>
